<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>桜 · 樱花手势</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0508;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; font-family: 'Noto Serif SC', serif;
    overflow: hidden;
  }
  .scene { position: relative; width: 640px; max-width: 100vw; }
  video { position: absolute; top: 0; left: 0; width: 100%; opacity: 0; pointer-events: none; }
  #camCanvas { width: 100%; border-radius: 16px; display: block; }
  #fxCanvas  {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    border-radius: 16px; pointer-events: none;
  }
  .badge {
    position: absolute; bottom: 1rem; left: 50%;
    transform: translateX(-50%);
    background: rgba(10,3,6,0.65);
    border: 1px solid rgba(242,167,184,0.25);
    backdrop-filter: blur(10px);
    padding: 0.35rem 1.2rem;
    border-radius: 999px;
    font-size: 0.72rem; letter-spacing: 0.35em;
    color: rgba(249,208,218,0.75); white-space: nowrap;
  }
  #startBtn {
    margin-top: 1.5rem;
    padding: 0.85rem 2.8rem;
    background: transparent;
    border: 1px solid rgba(242,167,184,0.5);
    color: #f9d0da; border-radius: 999px;
    font-size: 0.85rem; letter-spacing: 0.3em;
    cursor: pointer; transition: all 0.3s;
    font-family: inherit;
  }
  #startBtn:hover { background: rgba(242,167,184,0.1); }
  #startBtn:disabled { opacity: 0.35; cursor: default; }
  .hint {
    margin-top: 1rem; font-size: 0.68rem;
    color: rgba(255,255,255,0.2); letter-spacing: 0.25em;
    text-align: center; line-height: 2.2;
  }
  #overlay {
    position: absolute; inset: 0;
    background: rgba(13,5,8,0.9);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 0.6rem;
  }
  #overlay .ov-kanji {
    font-size: 4rem; color: rgba(242,167,184,0.15);
    letter-spacing: 0.2em; font-weight: 300;
  }
  #overlay .ov-text {
    color: rgba(249,208,218,0.35);
    font-size: 0.72rem; letter-spacing: 0.5em;
  }
  #overlay.hidden { display: none; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300&display=swap" rel="stylesheet">
</head>
<body>

<div class="scene">
  <video id="video" autoplay playsinline></video>
  <canvas id="camCanvas"></canvas>
  <canvas id="fxCanvas"></canvas>
  <div class="badge" id="badge">一期一会</div>
  <div id="overlay">
    <div class="ov-kanji">桜</div>
    <div class="ov-text">开启 · 感知 · 绽放</div>
  </div>
</div>

<button id="startBtn" onclick="start()">开启樱花感知</button>
<div class="hint">
  张开手掌 · 花瓣随指而生<br>
  握拳 · 归于寂静
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script>
const video     = document.getElementById('video');
const camCanvas = document.getElementById('camCanvas');
const fxCanvas  = document.getElementById('fxCanvas');
const camCtx    = camCanvas.getContext('2d');
const fxCtx     = fxCanvas.getContext('2d');
const badge     = document.getElementById('badge');

// ══════════════════════════════════════
//  性能优化：跳帧控制
//  MediaPipe 每帧都调用太贵，改成每隔一帧识别一次
// ══════════════════════════════════════
let frameCount = 0;
let lastLandmarks = null; // 缓存上一次识别结果，跳帧时复用

// ══════════════════════════════════════
//  花瓣粒子 — 极简风格
//  每次只生 1~2 片，寿命长，飘落慢
// ══════════════════════════════════════
const particles = [];

// 只用两种颜色，纯白与淡粉，保持克制
const PETAL_COLORS = [
  [255, 255, 255],      // 纯白
  [249, 208, 218],      // 樱粉
  [242, 167, 184],      // 玫粉
];

class Petal {
  constructor(x, y, mode) {
    this.x = x;
    this.y = y;

    const isPoint = mode === 'point';
    this.size  = isPoint ? (2 + Math.random() * 4) : (4 + Math.random() * 9);
    this.life  = 1.0;
    this.decay = 0.005 + Math.random() * 0.006; // 寿命很长，慢慢消逝
    this.vx    = (Math.random() - 0.5) * 0.8;
    this.vy    = -(0.3 + Math.random() * 0.7);  // 先轻轻上升
    this.gravity = 0.018;                        // 重力很小，飘得慢
    this.rot   = Math.random() * Math.PI * 2;
    this.rotV  = (Math.random() - 0.5) * 0.025;
    this.sway  = Math.random() * Math.PI * 2;
    this.swayS = 0.015 + Math.random() * 0.015;
    this.swayA = 0.25 + Math.random() * 0.5;    // 横向飘动幅度小
    const c    = PETAL_COLORS[Math.floor(Math.random() * PETAL_COLORS.length)];
    this.r = c[0]; this.g = c[1]; this.b = c[2];
  }

  update() {
    this.sway += this.swayS;
    this.x    += this.vx + Math.sin(this.sway) * this.swayA;
    this.vy   += this.gravity;
    this.y    += this.vy;
    this.rot  += this.rotV;
    this.life -= this.decay;
  }

  draw(ctx) {
    if (this.life <= 0) return;
    ctx.save();
    ctx.globalAlpha = Math.pow(this.life, 1.5) * 0.82; // 末尾快速淡出
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);

    // 纯椭圆，无渐变，性能更好
    ctx.beginPath();
    ctx.ellipse(0, 0, this.size * 0.38, this.size, 0, 0, Math.PI * 2);
    ctx.fillStyle = `rgb(${this.r},${this.g},${this.b})`;
    ctx.fill();

    // 一根极细花脉
    ctx.beginPath();
    ctx.moveTo(0, -this.size * 0.75);
    ctx.lineTo(0,  this.size * 0.75);
    ctx.strokeStyle = `rgba(${this.r},${this.g},${this.b},0.25)`;
    ctx.lineWidth = 0.4;
    ctx.stroke();

    ctx.restore();
  }
}

function spawnPetals(x, y, mode) {
  // 关键改动：每次只生成 1 片（食指模式）或 2 片（张开模式）
  const count = mode === 'point' ? 1 : 2;
  // 再加一层概率控制：不是每帧都生成，保持稀疏感
  if (Math.random() > (mode === 'point' ? 0.7 : 0.55)) return;
  for (let i = 0; i < count; i++) {
    particles.push(new Petal(x, y, mode));
  }
}

// ══════════════════════════════════════
//  手势判断
// ══════════════════════════════════════
function fingerOpen(lm, tip, pip) {
  return lm[tip].y < lm[pip].y;
}

function detectGesture(lm) {
  const index  = fingerOpen(lm, 8,  6);
  const middle = fingerOpen(lm, 12, 10);
  const ring   = fingerOpen(lm, 16, 14);
  const pinky  = fingerOpen(lm, 20, 18);
  const open   = [index, middle, ring, pinky].filter(Boolean).length;

  if (open >= 3) return 'open';
  if (open === 0) return 'fist';
  if (index && !middle && !ring && !pinky) return 'point';
  return 'other';
}

// ══════════════════════════════════════
//  骨架绘制 — 更淡，只作辅助
// ══════════════════════════════════════
function drawSkeleton(ctx, lm, gesture) {
  if (gesture === 'fist') return; // 握拳时不画骨架

  const lineAlpha = gesture === 'open' ? 0.25 : 0.35;
  const dotAlpha  = gesture === 'open' ? 0.4  : 0.6;

  for (const [a, b] of HAND_CONNECTIONS) {
    const pa = lm[a], pb = lm[b];
    ctx.beginPath();
    ctx.moveTo(pa.x * camCanvas.width, pa.y * camCanvas.height);
    ctx.lineTo(pb.x * camCanvas.width, pb.y * camCanvas.height);
    ctx.strokeStyle = `rgba(249,208,218,${lineAlpha})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // 只画指尖，不画所有关节
  [4, 8, 12, 16, 20].forEach(i => {
    const pt = lm[i];
    ctx.beginPath();
    ctx.arc(pt.x * camCanvas.width, pt.y * camCanvas.height, 3, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${dotAlpha})`;
    ctx.fill();
  });
}

// ══════════════════════════════════════
//  粒子层独立渲染循环
// ══════════════════════════════════════
function renderFx() {
  // 拖尾：透明度更高，残影更短，更干净
  fxCtx.fillStyle = 'rgba(13,5,8,0.28)';
  fxCtx.fillRect(0, 0, fxCanvas.width, fxCanvas.height);

  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    particles[i].draw(fxCtx);
    if (particles[i].life <= 0) particles.splice(i, 1);
  }

  requestAnimationFrame(renderFx);
}

// ══════════════════════════════════════
//  MediaPipe 回调
// ══════════════════════════════════════
let tracking = false;

function onResults(results) {
  frameCount++;

  const W = results.image.width, H = results.image.height;
  camCanvas.width = fxCanvas.width  = W;
  camCanvas.height= fxCanvas.height = H;

  // 画摄像头（镜像）
  camCtx.save();
  camCtx.scale(-1, 1);
  camCtx.drawImage(results.image, -W, 0);
  camCtx.restore();

  // 稍微压暗，让花瓣更突出
  camCtx.fillStyle = 'rgba(13,5,8,0.3)';
  camCtx.fillRect(0, 0, W, H);

  // 跳帧：每 2 帧才做完整识别，奇数帧复用上次结果
  const doDetect = (frameCount % 2 === 0);
  const landmarks = doDetect
    ? (results.multiHandLandmarks || [])
    : (lastLandmarks || []);

  if (doDetect) lastLandmarks = results.multiHandLandmarks || [];

  if (!landmarks.length) {
    badge.textContent = '虚空以待';
    return;
  }

  landmarks.forEach(raw => {
    const lm = raw.map(pt => ({ ...pt, x: 1 - pt.x }));
    const gesture = detectGesture(lm);

    if (gesture === 'open') {
      tracking = true;
      badge.textContent = '花开';
    } else if (gesture === 'fist') {
      tracking = false;
      badge.textContent = '归寂';
    } else if (gesture === 'point') {
      tracking = true;
      badge.textContent = '一点樱';
    } else {
      badge.textContent = '感知中';
    }

    drawSkeleton(camCtx, lm, gesture);

    if (tracking) {
      if (gesture === 'open') {
        // 只在食指尖生成，不铺满三根手指
        const t = lm[8];
        spawnPetals(t.x * W, t.y * H, 'open');
      } else if (gesture === 'point') {
        const t = lm[8];
        spawnPetals(t.x * W, t.y * H, 'point');
      }
    }
  });
}

// ══════════════════════════════════════
//  启动
// ══════════════════════════════════════
async function start() {
  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  btn.textContent = '感知觉醒中 ···';

  const hands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
  });

  hands.setOptions({
    maxNumHands: 1,          // 改成只识别 1 只手，省一半算力
    modelComplexity: 0,      // 改成 0（轻量模型），帧率提升明显
    minDetectionConfidence: 0.65,
    minTrackingConfidence:  0.5,
  });

  hands.onResults(onResults);

  const camera = new Camera(video, {
    onFrame: async () => { await hands.send({ image: video }); },
    width: 640, height: 480,
  });

  await camera.start();
  document.getElementById('overlay').classList.add('hidden');
  btn.textContent = '桜 · 运行中';
  renderFx();
}
</script>
</body>
</html>
