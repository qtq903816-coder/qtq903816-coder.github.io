<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>摄像头测试</title>
<style>
  body { background: #1a0a0e; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: sans-serif; color: white; }
  video { border-radius: 12px; width: 640px; max-width: 100vw; }
  button { margin-top: 1.5rem; padding: 0.8rem 2rem; background: #f2a7b8; color: #2c1a1e; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
  #status { margin-top: 1rem; color: #f2a7b8; font-size: 0.9rem; letter-spacing: 0.2em; }
</style>
</head>
<body>
  <video id="video" autoplay playsinline></video>
  <button onclick="startCamera()">开启摄像头</button>
  <div id="status">点击按钮开启摄像头</div>

<script>
async function startCamera() {
  const status = document.getElementById('status');
  try {
    // 向浏览器请求摄像头权限
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    document.getElementById('video').srcObject = stream;
    status.textContent = '✓ 摄像头已开启';
  } catch (err) {
    status.textContent = '✗ 无法开启摄像头：' + err.message;
  }
}
</script>
</body>
</html>
