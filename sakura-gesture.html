<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>桜 · 樱花手势</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0508;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; font-family: 'Noto Serif SC', serif;
    overflow: hidden;
  }
  .scene { position: relative; width: 640px; max-width: 100vw; }
  video { position: absolute; opacity: 0; pointer-events: none; }
  #camCanvas { width: 100%; border-radius: 16px; display: block; }
  #fxCanvas  {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    border-radius: 16px; pointer-events: none;
  }
  .badge {
    position: absolute; bottom: 1rem; left: 50%;
    transform: translateX(-50%);
    background: rgba(10,3,6,0.6);
    border: 1px solid rgba(242,167,184,0.2);
    backdrop-filter: blur(10px);
    padding: 0.35rem 1.4rem; border-radius: 999px;
    font-size: 0.72rem; letter-spacing: 0.4em;
    color: rgba(249,208,218,0.7); white-space: nowrap;
    transition: opacity 0.5s;
  }
  #startBtn {
    margin-top: 1.5rem; padding: 0.85rem 2.8rem;
    background: transparent;
    border: 1px solid rgba(242,167,184,0.4);
    color: #f9d0da; border-radius: 999px;
    font-size: 0.85rem; letter-spacing: 0.35em;
    cursor: pointer; transition: all 0.3s; font-family: inherit;
  }
  #startBtn:hover { background: rgba(242,167,184,0.08); border-color: rgba(242,167,184,0.7); }
  #startBtn:disabled { opacity: 0.3; cursor: default; }
  .hint {
    margin-top: 0.9rem; font-size: 0.67rem;
    color: rgba(255,255,255,0.18); letter-spacing: 0.3em;
    text-align: center; line-height: 2.4;
  }
  #overlay {
    position: absolute; inset: 0; border-radius: 16px;
    background: rgba(13,5,8,0.92);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 0.8rem;
  }
  .ov-kanji { font-size: 5rem; color: rgba(242,167,184,0.12); font-weight: 300; }
  .ov-text  { color: rgba(249,208,218,0.3); font-size: 0.7rem; letter-spacing: 0.6em; }
  #overlay.hidden { display: none; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300&display=swap" rel="stylesheet">
</head>
<body>

<div class="scene">
  <video id="video" autoplay playsinline></video>
  <canvas id="camCanvas"></canvas>
  <canvas id="fxCanvas"></canvas>
  <div class="badge" id="badge">一期一会</div>
  <div id="overlay">
    <div class="ov-kanji">桜</div>
    <div class="ov-text">感知 · 流动 · 绽放</div>
  </div>
</div>

<button id="startBtn" onclick="start()">开启</button>
<div class="hint">
  张开手掌 · 拖尾随指流动<br>
  握拳 · 归于寂静
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script>
const video     = document.getElementById('video');
const camCanvas = document.getElementById('camCanvas');
const fxCanvas  = document.getElementById('fxCanvas');
const camCtx    = camCanvas.getContext('2d');
const fxCtx     = fxCanvas.getContext('2d');
const badge     = document.getElementById('badge');

// ══════════════════════════════
//  拖尾轨迹点队列
//  每只手独立维护一条轨迹
// ══════════════════════════════
const TRAIL_LEN = 28;   // 保留多少个历史点
const trails = {
  left:  [],
  right: []
};

function addPoint(hand, x, y) {
  const t = trails[hand];
  t.push({ x, y, time: performance.now() });
  if (t.length > TRAIL_LEN) t.shift();
}

function clearTrail(hand) {
  trails[hand] = [];
}

// ══════════════════════════════
//  绘制拖尾
//  用贝塞尔曲线平滑连接轨迹点
//  越旧的点越细越透明
// ══════════════════════════════
function drawTrail(ctx, points) {
  if (points.length < 3) return;
  const now = performance.now();

  for (let i = 1; i < points.length; i++) {
    const t   = i / points.length;          // 0→1，越大越新
    const age = (now - points[i].time) / 600; // 时间老化 0→1

    const alpha = Math.pow(t, 1.4) * (1 - age * 0.3);
    if (alpha <= 0) continue;

    const width = t * 6;  // 尾部细，头部粗

    // 颜色：旧点偏紫，新点偏粉白，形成渐变过渡
    const r = Math.round(180 + 75  * t);
    const g = Math.round(80  + 90  * t);
    const b = Math.round(150 + 68  * t);

    ctx.save();
    ctx.globalAlpha = alpha * 0.85;
    ctx.strokeStyle = `rgb(${r},${g},${b})`;
    ctx.lineWidth   = width;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';

    // 用相邻三点做二次贝塞尔，使轨迹平滑
    if (i >= 2) {
      const prev2 = points[i - 2];
      const prev1 = points[i - 1];
      const curr  = points[i];
      const cpx   = (prev1.x + curr.x) / 2;
      const cpy   = (prev1.y + curr.y) / 2;

      ctx.beginPath();
      ctx.moveTo((prev2.x + prev1.x) / 2, (prev2.y + prev1.y) / 2);
      ctx.quadraticCurveTo(prev1.x, prev1.y, cpx, cpy);
      ctx.stroke();
    }
    ctx.restore();
  }

  // 指尖光晕
  const tip = points[points.length - 1];
  const pulse = 0.6 + 0.4 * Math.sin(performance.now() * 0.006);
  const grd = ctx.createRadialGradient(tip.x, tip.y, 0, tip.x, tip.y, 14);
  grd.addColorStop(0,   `rgba(255,210,230,${0.55 * pulse})`);
  grd.addColorStop(0.4, `rgba(242,167,184,${0.25 * pulse})`);
  grd.addColorStop(1,   'rgba(242,167,184,0)');
  ctx.beginPath();
  ctx.arc(tip.x, tip.y, 14, 0, Math.PI * 2);
  ctx.fillStyle = grd;
  ctx.fill();
}

// ══════════════════════════════
//  骨架（极简，仅作定位参考）
// ══════════════════════════════
function drawSkeleton(ctx, lm) {
  for (const [a, b] of HAND_CONNECTIONS) {
    const pa = lm[a], pb = lm[b];
    ctx.beginPath();
    ctx.moveTo(pa.x * camCanvas.width, pa.y * camCanvas.height);
    ctx.lineTo(pb.x * camCanvas.width, pb.y * camCanvas.height);
    ctx.strokeStyle = 'rgba(249,208,218,0.18)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
}

// ══════════════════════════════
//  手势判断
// ══════════════════════════════
function fingerOpen(lm, tip, pip) { return lm[tip].y < lm[pip].y; }

function detectGesture(lm) {
  const i = fingerOpen(lm, 8,  6);
  const m = fingerOpen(lm, 12, 10);
  const r = fingerOpen(lm, 16, 14);
  const p = fingerOpen(lm, 20, 18);
  const n = [i, m, r, p].filter(Boolean).length;
  if (n >= 3) return 'open';
  if (n === 0) return 'fist';
  return 'other';
}

// ══════════════════════════════
//  fxCanvas 渲染循环（独立 rAF）
//  只负责拖尾，不做识别，永远流畅
// ══════════════════════════════
function renderFx() {
  // 快速清除（不用半透明叠加，直接 clear，拖尾由轨迹点自己控制长度）
  fxCtx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);

  drawTrail(fxCtx, trails.right);
  drawTrail(fxCtx, trails.left);

  requestAnimationFrame(renderFx);
}

// ══════════════════════════════
//  MediaPipe 回调
// ══════════════════════════════
let frameCount = 0;
let cachedLM   = [];
let cachedHand = [];

function onResults(results) {
  frameCount++;
  const W = results.image.width, H = results.image.height;
  camCanvas.width = fxCanvas.width  = W;
  camCanvas.height= fxCanvas.height = H;

  // 摄像头画面（镜像）
  camCtx.save();
  camCtx.scale(-1, 1);
  camCtx.drawImage(results.image, -W, 0);
  camCtx.restore();

  // 轻压暗
  camCtx.fillStyle = 'rgba(13,5,8,0.22)';
  camCtx.fillRect(0, 0, W, H);

  // 跳帧：每 2 帧做一次完整识别
  const doDetect = (frameCount % 2 === 0);
  if (doDetect) {
    cachedLM   = results.multiHandLandmarks  || [];
    cachedHand = results.multiHandedness     || [];
  }

  if (!cachedLM.length) {
    clearTrail('left'); clearTrail('right');
    badge.textContent = '虚空以待';
    return;
  }

  cachedLM.forEach((raw, idx) => {
    const lm      = raw.map(pt => ({ ...pt, x: 1 - pt.x }));
    const gesture = detectGesture(lm);

    // MediaPipe 返回的 handedness 在镜像后左右互换
    const label   = cachedHand[idx]?.label === 'Left' ? 'right' : 'left';

    if (gesture === 'open') {
      badge.textContent = '花开';
      drawSkeleton(camCtx, lm);
      const tip = lm[8];
      addPoint(label, tip.x * W, tip.y * H);
    } else if (gesture === 'fist') {
      badge.textContent = '归寂';
      clearTrail(label);
    } else {
      badge.textContent = '感知中';
      // 其他手势也保持拖尾（过渡自然）
      const tip = lm[8];
      addPoint(label, tip.x * W, tip.y * H);
    }
  });
}

// ══════════════════════════════
//  启动
// ══════════════════════════════
async function start() {
  const btn = document.getElementById('startBtn');
  btn.disabled = true; btn.textContent = '唤醒中 ···';

  const hands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
  });
  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 0,          // 轻量模型
    minDetectionConfidence: 0.65,
    minTrackingConfidence:  0.55,
  });
  hands.onResults(onResults);

  const camera = new Camera(video, {
    onFrame: async () => { await hands.send({ image: video }); },
    width: 640, height: 480,
  });
  await camera.start();

  document.getElementById('overlay').classList.add('hidden');
  btn.textContent = '桜 · 运行中';

  renderFx(); // 启动独立渲染循环
}
</script>
</body>
</html>
