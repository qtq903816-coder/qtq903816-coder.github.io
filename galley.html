<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>桜 Gallery · 樱花图集</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fdf0f3;font-family:'Noto Serif SC',serif;color:#2c1a1e}
:root{--deep:#7a2a3a;--blush:#f2a7b8;--petal:#f9d0da;--bark:#6b3a2a;--mist:#fdf0f3}

.nav{position:sticky;top:0;z-index:100;background:rgba(253,240,243,0.92);backdrop-filter:blur(12px);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(242,167,184,0.3)}
.nav-logo{font-size:1.4rem;color:var(--deep);letter-spacing:0.1em;font-weight:300}
.nav-logo span{font-size:0.7rem;letter-spacing:0.5em;color:var(--blush);display:block;margin-top:2px}
.nav-back{font-size:0.75rem;letter-spacing:0.3em;color:var(--bark);text-decoration:none;border:1px solid rgba(242,167,184,0.5);padding:0.4rem 1rem;transition:all 0.3s}
.nav-back:hover{background:var(--petal)}

.gallery-hero{padding:4rem 2rem 2rem;text-align:center}
.gallery-hero h1{font-size:clamp(2rem,5vw,3.5rem);font-weight:300;color:var(--deep);font-style:italic}
.gallery-hero p{margin-top:0.8rem;color:var(--bark);font-size:0.9rem;letter-spacing:0.2em}

.filter-bar{display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;padding:2rem 2rem 1rem}
.filter-btn{font-size:0.75rem;letter-spacing:0.3em;padding:0.5rem 1.2rem;border:1px solid rgba(242,167,184,0.6);background:transparent;color:var(--bark);cursor:pointer;transition:all 0.3s;font-family:'Noto Serif SC',serif}
.filter-btn:hover,.filter-btn.active{background:var(--deep);color:white;border-color:var(--deep)}

.gallery-grid{columns:3 280px;gap:12px;padding:1rem 2rem 4rem;max-width:1200px;margin:0 auto}
.gallery-item{break-inside:avoid;margin-bottom:12px;position:relative;cursor:pointer;overflow:hidden;border-radius:4px}
.gallery-item img{width:100%;display:block;transition:transform 0.5s ease}
.gallery-item:hover img{transform:scale(1.05)}
.gallery-item .overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(122,42,58,0.75) 0%,transparent 50%);opacity:0;transition:opacity 0.3s;display:flex;flex-direction:column;justify-content:flex-end;padding:1rem}
.gallery-item:hover .overlay{opacity:1}
.overlay-title{color:white;font-size:0.85rem;font-weight:300;letter-spacing:0.1em}
.overlay-sub{color:rgba(249,208,218,0.8);font-size:0.7rem;letter-spacing:0.3em;margin-top:4px}

.lightbox{position:fixed;inset:0;background:rgba(20,8,10,0.95);z-index:1000;display:none;flex-direction:column;align-items:center;justify-content:center}
.lightbox.open{display:flex}
.lb-img-wrap img{max-width:90vw;max-height:75vh;object-fit:contain;border-radius:4px;animation:lbFade 0.3s ease}
@keyframes lbFade{from{opacity:0;transform:scale(0.97)}to{opacity:1;transform:scale(1)}}
.lb-info{margin-top:1.5rem;text-align:center}
.lb-title{color:#f9d0da;font-size:1.1rem;font-weight:300;letter-spacing:0.2em}
.lb-desc{color:rgba(249,208,218,0.6);font-size:0.8rem;margin-top:0.4rem;letter-spacing:0.1em}
.lb-counter{color:rgba(255,255,255,0.3);font-size:0.7rem;letter-spacing:0.4em;margin-top:0.8rem}
.lb-close{position:absolute;top:1.5rem;right:1.5rem;color:white;font-size:1.5rem;cursor:pointer;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.2);transition:all 0.3s}
.lb-close:hover{background:rgba(255,255,255,0.1)}
.lb-arrow{position:absolute;top:50%;transform:translateY(-50%);color:white;font-size:1.5rem;cursor:pointer;width:48px;height:48px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.15);transition:all 0.3s;background:rgba(0,0,0,0.3)}
.lb-arrow:hover{background:rgba(255,255,255,0.1)}
.lb-prev{left:1rem}.lb-next{right:1rem}
.lb-dots{display:flex;gap:8px;justify-content:center;margin-top:1rem}
.lb-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.25);cursor:pointer;transition:all 0.3s}
.lb-dot.active{background:#f2a7b8;transform:scale(1.3)}
#petal-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
</style>
</head>
<body>
<canvas id="petal-canvas"></canvas>
<nav class="nav">
  <div class="nav-logo">桜 Gallery<span>SAKURA COLLECTION</span></div>
  <a class="nav-back" href="index.html">← 返回主页</a>
</nav>
<div class="gallery-hero">
  <h1>Sakura in Bloom</h1>
  <p>日本各地 · 樱花摄影集</p>
</div>
<div class="filter-bar">
  <button class="filter-btn active" data-filter="all">全部</button>
  <button class="filter-btn" data-filter="tokyo">东京</button>
  <button class="filter-btn" data-filter="kyoto">京都</button>
  <button class="filter-btn" data-filter="nature">自然</button>
  <button class="filter-btn" data-filter="night">夜樱</button>
</div>
<div class="gallery-grid" id="grid"></div>
<div class="lightbox" id="lb">
  <div class="lb-close" id="lbClose">✕</div>
  <div class="lb-arrow lb-prev" id="lbPrev">‹</div>
  <div class="lb-img-wrap"><img id="lbImg" src="" alt=""></div>
  <div class="lb-arrow lb-next" id="lbNext">›</div>
  <div class="lb-info">
    <div class="lb-title" id="lbTitle"></div>
    <div class="lb-desc" id="lbDesc"></div>
    <div class="lb-counter" id="lbCounter"></div>
  </div>
  <div class="lb-dots" id="lbDots"></div>
</div>
<script>
const photos=[
  {id:1,tag:'tokyo',title:'上野公园',desc:'东京 · 上野',w:800,h:600,seed:101,color:'FFB7C5,FF8FAB,FF6B9D'},
  {id:2,tag:'kyoto',title:'円山公园枝垂樱',desc:'京都 · 祇园',w:600,h:900,seed:202,color:'FADADD,F4A7B9,E8789A'},
  {id:3,tag:'nature',title:'山间野樱',desc:'奈良 · 吉野山',w:900,h:600,seed:303,color:'FFD1DC,FFC0CB,FFB6C1'},
  {id:4,tag:'night',title:'夜樱灯影',desc:'东京 · 目黑川',w:700,h:500,seed:404,color:'C2185B,AD1457,880E4F'},
  {id:5,tag:'tokyo',title:'千鸟渊',desc:'东京 · 皇居外苑',w:800,h:1100,seed:505,color:'F48FB1,F06292,EC407A'},
  {id:6,tag:'kyoto',title:'仁和寺御室樱',desc:'京都 · 仁和寺',w:750,h:500,seed:606,color:'FFCDD2,EF9A9A,E57373'},
  {id:7,tag:'nature',title:'湖畔倒影',desc:'滋贺 · 琵琶湖',w:900,h:600,seed:707,color:'F8BBD9,F48FB1,F06292'},
  {id:8,tag:'night',title:'石灯笼与夜樱',desc:'京都 · 平安神宫',w:600,h:800,seed:808,color:'7B1FA2,6A1B9A,4A148C'},
  {id:9,tag:'tokyo',title:'新宿御苑',desc:'东京 · 新宿',w:850,h:570,seed:909,color:'FCE4EC,F8BBD9,F48FB1'},
  {id:10,tag:'kyoto',title:'哲学之道',desc:'京都 · 银阁寺附近',w:600,h:900,seed:1010,color:'EF9A9A,E57373,EF5350'},
  {id:11,tag:'nature',title:'山樱初绽',desc:'长野 · 高远城址',w:900,h:600,seed:1111,color:'FFCCBC,FFAB91,FF8A65'},
  {id:12,tag:'night',title:'满月与樱',desc:'奈良 · 东大寺',w:700,h:700,seed:1212,color:'4527A0,311B92,1A237E'},
];

// ★ 如果你有真实图片，把这里替换成真实图片URL即可，例如：
// const realImgs = { 1: 'https://你的图片链接.jpg', 2: '...', ... }

function makeImg(p){
  const c=document.createElement('canvas');c.width=p.w;c.height=p.h;
  const ctx=c.getContext('2d');const cols=p.color.split(',').map(x=>'#'+x);
  const gr=ctx.createLinearGradient(0,0,p.w,p.h);
  gr.addColorStop(0,cols[0]);gr.addColorStop(0.5,cols[1]);gr.addColorStop(1,cols[2]);
  ctx.fillStyle=gr;ctx.fillRect(0,0,p.w,p.h);
  const rng=(s)=>{s=Math.sin(s)*43758.5453;return s-Math.floor(s)};
  for(let i=0;i<60;i++){
    const x=rng(p.seed+i*7)*p.w,y=rng(p.seed+i*13)*p.h;
    const r=rng(p.seed+i*3)*18+4,alpha=rng(p.seed+i*17)*0.6+0.2;
    ctx.save();ctx.globalAlpha=alpha;
    for(let k=0;k<5;k++){ctx.save();ctx.translate(x,y);ctx.rotate((k/5)*Math.PI*2);ctx.beginPath();ctx.ellipse(r*0.7,0,r*0.5,r*0.3,0,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.85)';ctx.fill();ctx.restore();}
    ctx.beginPath();ctx.arc(x,y,r*0.25,0,Math.PI*2);ctx.fillStyle='rgba(255,220,100,0.9)';ctx.fill();ctx.restore();
  }
  ctx.save();ctx.globalAlpha=0.15;ctx.strokeStyle='#4a1a2a';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(0,p.h*0.8);ctx.quadraticCurveTo(p.w*0.3,p.h*0.4,p.w*0.7,p.h*0.2);ctx.stroke();ctx.restore();
  const vg=ctx.createRadialGradient(p.w/2,p.h/2,p.w*0.3,p.w/2,p.h/2,p.w*0.75);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.3)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,p.w,p.h);
  return c.toDataURL('image/jpeg',0.85);
}

const imgCache={};photos.forEach(p=>imgCache[p.id]=makeImg(p));
let currentIdx=0,filteredPhotos=[];

function renderGrid(filter){
  filteredPhotos=filter==='all'?photos:photos.filter(p=>p.tag===filter);
  const grid=document.getElementById('grid');grid.innerHTML='';
  filteredPhotos.forEach((p,i)=>{
    const div=document.createElement('div');div.className='gallery-item';
    div.style.cssText='opacity:0;transform:translateY(20px);transition:all 0.4s ease '+i*0.05+'s';
    div.innerHTML=`<img src="${imgCache[p.id]}" alt="${p.title}"><div class="overlay"><div class="overlay-title">${p.title}</div><div class="overlay-sub">${p.desc}</div></div>`;
    div.addEventListener('click',()=>openLb(i));grid.appendChild(div);
    setTimeout(()=>{div.style.opacity='1';div.style.transform='translateY(0)'},50);
  });
}

function openLb(idx){
  currentIdx=idx;updateLb();
  document.getElementById('lb').classList.add('open');document.body.style.overflow='hidden';
  const dots=document.getElementById('lbDots');dots.innerHTML='';
  filteredPhotos.forEach((_,i)=>{const d=document.createElement('div');d.className='lb-dot'+(i===idx?' active':'');d.addEventListener('click',()=>{currentIdx=i;updateLb();});dots.appendChild(d);});
}

function updateLb(){
  const p=filteredPhotos[currentIdx];
  document.getElementById('lbImg').src=imgCache[p.id];
  document.getElementById('lbTitle').textContent=p.title;
  document.getElementById('lbDesc').textContent=p.desc;
  document.getElementById('lbCounter').textContent=(currentIdx+1)+' / '+filteredPhotos.length;
  document.querySelectorAll('.lb-dot').forEach((d,i)=>d.classList.toggle('active',i===currentIdx));
}

function closeLb(){document.getElementById('lb').classList.remove('open');document.body.style.overflow='';}
document.getElementById('lbClose').addEventListener('click',closeLb);
document.getElementById('lb').addEventListener('click',e=>{if(e.target.id==='lb')closeLb();});
document.getElementById('lbPrev').addEventListener('click',()=>{currentIdx=(currentIdx-1+filteredPhotos.length)%filteredPhotos.length;updateLb();});
document.getElementById('lbNext').addEventListener('click',()=>{currentIdx=(currentIdx+1)%filteredPhotos.length;updateLb();});
document.addEventListener('keydown',e=>{
  if(!document.getElementById('lb').classList.contains('open'))return;
  if(e.key==='Escape')closeLb();
  if(e.key==='ArrowLeft'){currentIdx=(currentIdx-1+filteredPhotos.length)%filteredPhotos.length;updateLb();}
  if(e.key==='ArrowRight'){currentIdx=(currentIdx+1)%filteredPhotos.length;updateLb();}
});
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');renderGrid(btn.dataset.filter);
  });
});
renderGrid('all');

const pc=document.getElementById('petal-canvas'),pctx=pc.getContext('2d');
function rsz(){pc.width=window.innerWidth;pc.height=window.innerHeight;}rsz();window.addEventListener('resize',rsz);
const petals=Array.from({length:25},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,size:4+Math.random()*8,speedX:(Math.random()-0.5)*1.2,speedY:0.5+Math.random()*1,rot:Math.random()*Math.PI*2,rotS:(Math.random()-0.5)*0.03,sway:Math.random()*Math.PI*2,swayS:0.01+Math.random()*0.02,swayA:0.5+Math.random()*1.5,alpha:0.35+Math.random()*0.4}));
function animP(){
  pctx.clearRect(0,0,pc.width,pc.height);
  petals.forEach(p=>{p.sway+=p.swayS;p.x+=p.speedX+Math.sin(p.sway)*p.swayA;p.y+=p.speedY;p.rot+=p.rotS;if(p.y>pc.height+20){p.y=-20;p.x=Math.random()*pc.width;}
  pctx.save();pctx.translate(p.x,p.y);pctx.rotate(p.rot);pctx.globalAlpha=p.alpha;
  const g=pctx.createRadialGradient(0,0,0,0,0,p.size);g.addColorStop(0,'#fde8ef');g.addColorStop(0.6,'#f9c0d0');g.addColorStop(1,'rgba(240,140,170,0)');
  pctx.beginPath();pctx.ellipse(0,0,p.size*0.5,p.size,0,0,Math.PI*2);pctx.fillStyle=g;pctx.fill();pctx.restore();});
  requestAnimationFrame(animP);
}
animP();
</script>
</body>
</html>
